<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ensiguarda</title>
    <link rel="stylesheet" href="res/css/bootstrap.min.css">
    <script src="res/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="row alinha_centro">
        <div class="col-3">
            <img src="res/imagens/logo.png" alt="Logotipo">
        </div>
        <div class="col-4">
            <ul class="alinha_centro">
                <li>Escola</li>
                <li>Informações</li>
                <li>Instalações</li>
                <li>Contactos</li>
            </ul>
        </div>
        <div class="col-5 alinha_centro">
            <div class="row alinha_centro">
                <div class="col alinha_centro">
                    <h6 class="botao_inscricao">INSCRIÇÃO</h6>
                </div>
                <div class="col alinha_centro">
                    <h6 class="botao_alojamento">ALOJAMENTO</h6>
                </div>
                <div class="col alinha_centro">
                    <h6 class="botao_avaliacao">AVALIAÇÃO EXTERNA IGEC</h6>
                </div>
            </div>
        </div>
    </div>
    <div class="row alinha_centro titulos">
        <h3>OS NOSSOS CURSOS, A TUA ESCOLHA!</h3>
    </div>
    <div class="row alinha_centro">
        <div class="col">
            <img src="res/imagens/cursos/informatica.jpg" alt="">
        </div>
        <div class="col">
            <img src="res/imagens/cursos/multimedia.jpg" alt="">
        </div>
        <div class="col">
            <img src="res/imagens/cursos/comunicação.jpg" alt="">
        </div>
        <div class="col">
            <img src="res/imagens/cursos/mecanica.jpg" alt="">
        </div>
        <div class="col">
            <img src="res/imagens/cursos/saude.jpg" alt="">
        </div>
    </div>
    <div class="row alinha_centro titulos">
        <h3>O SUCESSO CONTINUA: OPORTUNIDADES DE EMPREGO</h3>
    </div>
    <div class="row alinha_centro">
        <img src="res/imagens/ofertaemprego.jpg" alt="">
    </div>

    <div id="carouselExampleIndicators" class="carousel slide">
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
            <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
        </div>
        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="res/imagens/cursos/informatica.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="res/imagens/cursos/comunicação.jpg" class="d-block w-100" alt="...">
            </div>
            <div class="carousel-item">
                <img src="res/imagens/cursos/multimedia.jpg" class="d-block w-100" alt="...">
            </div>
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</body>
</html>
